<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ "Commenti" }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button id="create" class="btn btn-primary" type="button" (click)="createNote()">
            <i class="fa fa-plus me-1"></i>
            <span>{{ "Aggiungi" }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="notes.items" [count]="notes.totalCount" [list]="list" default>
        <ngx-datatable-column [name]="'Nota'" prop="content"></ngx-datatable-column>
        <ngx-datatable-column [name]="'Importante'" prop="isImportant"></ngx-datatable-column>
        <ngx-datatable-column [sortable]="false">
            <ng-template let-row="row" ngx-datatable-cell-template>
                <button class="btn btn-info btn-sm me-1" (click)="editNote(row.id)">
                    <i class="fas fa-pencil-alt"></i>
                </button>
            </ng-template>
        </ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
        <h3>{{ (selectedNote.id ? '::Edit' : '::Donor:New' ) | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="mt-2">
        <label for="note-content">Nota<span> *</span></label>
        <textarea id="note-content" class="form-control" formControlName="content" autofocus></textarea>
    </div>

    <div class="mt-2">
      <label for="donor-isImportant">Importante</label>
      <input type="checkbox" id="donor-isImportant" class="form-check-input" formControlName="isImportant" />
    </div>
  </form>
</ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
        <i class="fa fa-check mr-1"></i>
        {{ '::Save' | abpLocalization }}
  </button>
  </ng-template>
</abp-modal>
