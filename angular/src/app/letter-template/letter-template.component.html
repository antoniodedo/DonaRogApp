<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ 'Templates Lettere' }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button id="create" class="btn btn-primary" type="button" (click)="createTemplate()">
            <i class="fa fa-plus me-1"></i>
            <span>{{ 'Nuova Lettera' }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="templates.items" [count]="templates.totalCount" [list]="list" default>
      <ngx-datatable-column [name]="'Name'" prop="name"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Description'" prop="description"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Is Active'" prop="isActive"></ngx-datatable-column>
      <ngx-datatable-column
  [sortable]="false"
>
  <ng-template let-row="row" ngx-datatable-cell-template>
     <button ngbDropdownItem (click)="editTemplate(row.id)">
            <i class="fa fa-pencil me-1"></i>
        </button>
  </ng-template>
</ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
        <h3>{{ (selectedTemplate.id ? '::Edit' : '::Title:New' ) | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
  <form [formGroup]="form" (ngSubmit)="save()">
     <div class="mt-2">
      <label for="template-name">Name</label><span> * </span>
      <input type="text" id="template-name" class="form-control" formControlName="name" autofocus />
    </div>

    <div class="mt-2">
      <label for="template-description">Description</label><span> * </span>
      <input type="text" id="template-description" class="form-control" formControlName="description" />
    </div>

  <div class="form-check mt-2">
    <input type="checkbox" id="template-is-active" class="form-check-input" formControlName="isActive" />
    <label for="template-is-active" class="form-check-label">Is Active</label>
  </div>
  <editor apiKey="fhmrddyvfrlmwictyj1bvm9bl0iryizjvwq8kkhb8o902v06"
  formControlName="content"
  [init]="{
    height: 300,
    menubar: false,
    plugins: 'lists link image table code',
    toolbar: 'undo redo | formatselect | bold italic | alignleft aligncenter alignright alignjustify | bullist numlist | code'
  }"
></editor>

  </form>
</ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
        <i class="fa fa-check mr-1"></i>
        {{ '::Save' | abpLocalization }}
  </button>
  </ng-template>
</abp-modal>
