<div class="admin-container">
  <!-- Hero Header -->
  <div class="hero-header tenants-theme">
    <div class="hero-content">
      <div class="hero-icon">
        <span nz-icon nzType="apartment" nzTheme="outline"></span>
        <div class="hero-icon-ring"></div>
      </div>
      <div class="hero-text">
        <h1>Gestione Tenant</h1>
        <p>Amministra le organizzazioni e i loro ambienti isolati</p>
      </div>
    </div>
    <div class="hero-actions">
      <button nz-button class="hero-btn" (click)="openCreateForm()" nz-tooltip="Nuovo Tenant">
        <span nz-icon nzType="plus"></span>
      </button>
    </div>
    <div class="hero-decoration">
      <div class="decoration-circle c1"></div>
      <div class="decoration-circle c2"></div>
      <div class="decoration-circle c3"></div>
    </div>
  </div>

  <!-- Quick Stats -->
  <div class="quick-stats">
    <div class="stat-card stat-total">
      <div class="stat-icon">
        <span nz-icon nzType="apartment"></span>
      </div>
      <div class="stat-info">
        <span class="stat-value">{{ total }}</span>
        <span class="stat-label">Tenant Totali</span>
      </div>
    </div>
  </div>

  <!-- List Card -->
  <nz-card class="list-card">
    <div class="toolbar">
      <div class="search-box">
        <nz-input-group [nzPrefix]="prefixIcon">
          <input nz-input placeholder="Cerca tenant..." [(ngModel)]="searchText" (keyup.enter)="search()" />
        </nz-input-group>
        <ng-template #prefixIcon><span nz-icon nzType="search"></span></ng-template>
      </div>
      <div class="toolbar-actions">
        <button nz-button nzType="default" (click)="loadTenants()" nz-tooltip="Aggiorna">
          <span nz-icon nzType="reload"></span>
        </button>
      </div>
    </div>

    <nz-table
      #tenantTable
      [nzData]="tenants"
      [nzLoading]="loading"
      [nzTotal]="total"
      [nzPageSize]="pageSize"
      [nzPageIndex]="pageIndex"
      [nzFrontPagination]="false"
      (nzPageIndexChange)="onPageIndexChange($event)"
      (nzPageSizeChange)="onPageSizeChange($event)"
      [nzShowSizeChanger]="true"
      [nzNoResult]="emptyTemplate">
      <thead>
        <tr>
          <th nzWidth="60px"></th>
          <th>Nome Tenant</th>
          <th nzWidth="300px">ID</th>
          <th nzWidth="140px" nzAlign="center">Azioni</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let tenant of tenantTable.data; let i = index" class="data-row" [style.animation-delay]="i * 30 + 'ms'">
          <td>
            <nz-avatar [nzText]="getInitials(tenant.name)" [nzSize]="40" class="tenant-avatar"></nz-avatar>
          </td>
          <td>
            <span class="tenant-name">{{ tenant.name }}</span>
          </td>
          <td>
            <span class="tenant-id">{{ tenant.id }}</span>
          </td>
          <td>
            <div class="actions-cell">
              <button class="action-btn edit" nz-button nzType="link" nzSize="small" (click)="openEditForm(tenant)" nz-tooltip="Modifica">
                <span nz-icon nzType="edit"></span>
              </button>
              <button class="action-btn delete" nz-button nzType="link" nzSize="small"
                      nz-popconfirm nzPopconfirmTitle="Eliminare questo tenant? Tutti i dati associati verranno persi!"
                      nzOkDanger
                      (nzOnConfirm)="deleteTenant(tenant)" nz-tooltip="Elimina">
                <span nz-icon nzType="delete"></span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </nz-table>

    <ng-template #emptyTemplate>
      <div class="empty-state">
        <div class="empty-illustration">
          <div class="empty-icon"><span nz-icon nzType="apartment"></span></div>
        </div>
        <h3>Nessun tenant trovato</h3>
        <p>Crea il primo tenant per iniziare</p>
        <button nz-button nzType="primary" (click)="openCreateForm()">
          <span nz-icon nzType="plus"></span>
          Nuovo Tenant
        </button>
      </div>
    </ng-template>
  </nz-card>
</div>

<!-- Form Modal -->
<nz-modal
  [(nzVisible)]="isFormVisible"
  [nzTitle]="isEditMode ? 'Modifica Tenant' : 'Nuovo Tenant'"
  [nzWidth]="500"
  [nzFooter]="modalFooter"
  (nzOnCancel)="closeForm()">
  
  <ng-container *nzModalContent>
    <form nz-form [formGroup]="form" nzLayout="vertical">
      <nz-form-item>
        <nz-form-label nzRequired>Nome Tenant</nz-form-label>
        <nz-form-control nzErrorTip="Nome obbligatorio">
          <input nz-input formControlName="name" placeholder="Es. Organizzazione XYZ" />
        </nz-form-control>
      </nz-form-item>

      <ng-container *ngIf="!isEditMode">
        <nz-alert nzType="info" nzMessage="Credenziali Amministratore" 
                  nzDescription="Queste credenziali verranno usate per creare l'utente admin del tenant."
                  nzShowIcon class="admin-alert"></nz-alert>

        <nz-form-item>
          <nz-form-label nzRequired>Email Amministratore</nz-form-label>
          <nz-form-control nzErrorTip="Email valida obbligatoria">
            <input nz-input formControlName="adminEmailAddress" placeholder="admin@tenant.com" />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>Password Amministratore</nz-form-label>
          <nz-form-control nzErrorTip="Password obbligatoria (min 6 caratteri)">
            <input nz-input type="password" formControlName="adminPassword" placeholder="Password sicura" />
          </nz-form-control>
        </nz-form-item>
      </ng-container>
    </form>
  </ng-container>

  <ng-template #modalFooter>
    <button nz-button (click)="closeForm()">Annulla</button>
    <button nz-button nzType="primary" (click)="save()" [nzLoading]="saving">
      <span nz-icon [nzType]="isEditMode ? 'save' : 'plus'"></span>
      {{ isEditMode ? 'Salva' : 'Crea' }}
    </button>
  </ng-template>
</nz-modal>
