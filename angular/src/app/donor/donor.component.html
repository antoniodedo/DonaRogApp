<div class="card">
  <div class="card-header">
    <div class="row">
      <div class="col col-md-6">
        <h5 class="card-title">
          {{ '::Menu:Donors' | abpLocalization }}
        </h5>
      </div>
      <div class="text-end col col-md-6">
        <div class="text-lg-end pt-2">
          <button id="create" class="btn btn-primary" type="button" (click)="createDonor()">
            <i class="fa fa-plus me-1"></i>
            <span>{{ "::Donor:New" | abpLocalization }}</span>
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card-body">
    <ngx-datatable [rows]="donors.items" [count]="donors.totalCount" [list]="list" default>
      <ngx-datatable-column [name]="'First Name'" prop="firstName"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Last Name'" prop="lastName"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Address'" prop="rawAddress"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Comune'" prop="rawComune"></ngx-datatable-column>
      <ngx-datatable-column [name]="'Cap'" prop="rawCap"></ngx-datatable-column>
      <ngx-datatable-column>
    <ng-template let-row="row" ngx-datatable-cell-template>
      <button (click)="openDetail(row.id)">
        <i class="fa fa-eye"></i>
      </button>
    </ng-template>
  </ngx-datatable-column>
      <ngx-datatable-column
  [sortable]="false"
>
  <ng-template let-row="row" ngx-datatable-cell-template>
     <button ngbDropdownItem (click)="editDonor(row.id)">
            <i class="fa fa-edit me-1"></i>
        </button>
  </ng-template>
</ngx-datatable-column>
    </ngx-datatable>
  </div>
</div>

<abp-modal [(visible)]="isModalOpen">
  <ng-template #abpHeader>
        <h3>{{ (selectedDonor.id ? '::Edit' : '::Donor:New' ) | abpLocalization }}</h3>
  </ng-template>

  <ng-template #abpBody>
  <form [formGroup]="form" (ngSubmit)="save()">
    <div class="mt-2">
      <label for="donor-firstName">Nome</label><span> * </span>
      <input type="text" id="donor-firstName" class="form-control" formControlName="firstName" autofocus />
    </div>

    <div class="mt-2">
      <label for="donor-lastName">Cognome</label><span> * </span>
      <input type="text" id="donor-lastName" class="form-control" formControlName="lastName" />
    </div>

     <div class="mt-2">
      <label for="donor-address">Indirizzo</label><span> * </span>
      <input type="text" id="donor-address" class="form-control" formControlName="rawAddress" />
    </div>

     <div class="mt-2">
      <label for="donor-comune">Comune</label><span> * </span>
      <input type="text" id="donor-comune" class="form-control" formControlName="rawComune" />
    </div>

     <div class="mt-2">
      <label for="donor-cap">Cap</label><span> * </span>
      <input type="text" id="donor-cap" class="form-control" formControlName="rawCap" />
    </div>

  </form>
</ng-template>

  <ng-template #abpFooter>
    <button type="button" class="btn btn-secondary" abpClose>
      {{ '::Close' | abpLocalization }}
    </button>
    <button class="btn btn-primary" (click)="save()" [disabled]="form.invalid">
        <i class="fa fa-check mr-1"></i>
        {{ '::Save' | abpLocalization }}
  </button>
  </ng-template>
</abp-modal>
